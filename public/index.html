<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simple Chat</title>
        <link rel="stylesheet" href="/style.css">
        <!-- npm i socket.io-client -->
        <script src="/socket.io/socket.io.js"></script>
        <script src="/script.js" defer></script>
    </head>
    <body>
        <h1>Simple Chat</h1>

        <form id="user-form" action="#" class="user-form">
            <label>
                Username:
                <input id="username" autocomplete="off" placeholder="Enter username" />
            </label>
            <label>
                Color:
                <input id="user-color" type="color" value="#0088ff" />
            </label>
            <button type="submit">Save Profile</button>
            <button id="disconnect-btn" type="button" style="margin-left: 10px;">Disconnect</button>
        </form>

        <p id="status" class="status"></p>
        <p id="active-clients" class="status">יש 0 לקוחות פעילים כרגע</p>

        <ul id="messages"></ul>
        <form id="form" action="#">
            <input
                id="input"
                autocomplete="off"
                placeholder="Type your message..." />
            <button>Send</button>
        </form>
    </body>
</html>
